      - reference
      - articles
    right:
      - search
      - github
  components:
    github:
      icon: fa-github
      href: https://github.com/immunoplex/curveRweights

home:
  title: "curveRweights"
  description: "Curve-based inverse-variance weighted estimation"

  # Logo on homepage
